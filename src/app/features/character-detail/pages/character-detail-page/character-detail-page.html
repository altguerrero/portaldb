<section class="detail-page">
  <p class="detail-page__eyebrow">Subject Profile</p>

  <h1 class="detail-page__title">Character Detail</h1>

  <p class="detail-page__description">
    This route will host the detail view for a single character and the favorite toggle.
  </p>

  <div class="detail-page__actions">
    <a [routerLink]="routes.characters" class="detail-page__button detail-page__button--primary">
      Back To Characters
    </a>

    <a [routerLink]="routes.favorites" class="detail-page__button detail-page__button--secondary">
      Go To Favorites
    </a>
  </div>
</section>

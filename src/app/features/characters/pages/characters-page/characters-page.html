@if (vm$ | async; as vm) {
  <section #pageTop class="characters-page">
    <div class="characters-page__hero">
      <div class="characters-page__heading">
        <h1 class="characters-page__title">
          Character
          <span class="characters-page__title-accent"> Registry </span>
        </h1>

        <div class="characters-page__rule"></div>
      </div>

      <div class="characters-page__intro">
        <span class="characters-page__intro-bar"></span>

        <p class="characters-page__intro-text">
          Accessing biological data from {{ vm.response.info.count }} confirmed multiversal
          entities.
        </p>
      </div>
    </div>

    <div class="characters-page__grid">
      @for (character of vm.response.results; track character.id) {
        <app-character-card [character]="character" />
      }
    </div>

    <app-pagination
      ariaLabel="Characters pagination"
      [currentPage]="vm.page"
      [totalPages]="vm.response.info.pages"
      (pageChange)="goToPage($event, vm.response.info.pages)"
    />
  </section>
}
